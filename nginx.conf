user nginx;
worker_processes auto; 
worker_cpu_affinity auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log error;
include /etc/nginx/modules-enabled/*.conf;

events { 
    worker_connections number; # conn. open by wp < fd
 };

http { 
    include ./sites-enabled/*;
    imclde ./conf.d/*.conf;
 };